name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - smoke
          - auth
          - portal
          - dashboard

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Supabase test environment
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  # Xero test credentials
  XERO_CLIENT_ID: ${{ secrets.XERO_CLIENT_ID }}
  XERO_CLIENT_SECRET: ${{ secrets.XERO_CLIENT_SECRET }}
  XERO_REDIRECT_URI: ${{ secrets.XERO_REDIRECT_URI }}
  # Email (Resend)
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  # Stripe test keys
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
  # E2E test credentials
  E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
  E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
  # CI flag
  CI: true

jobs:
  # ============================================
  # Job 1: Type Check & Lint (runs in parallel)
  # ============================================
  typecheck-and-lint:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: ESLint
        run: pnpm lint

  # ============================================
  # Job 2: Build (depends on typecheck)
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck-and-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next/
          retention-days: 1
          # upload-artifact defaults to excluding dotfiles/dot-directories,
          # but `.next` IS a dot-directory — without this flag it silently
          # uploads 0 files (job still shows "success"), and every job that
          # downloads this artifact then fails with "Artifact not found".
          include-hidden-files: true

  # ============================================
  # Job 3: E2E Tests Matrix (parallel execution)
  # ============================================
  e2e-tests:
    name: E2E ${{ matrix.suite }}
    runs-on: ubuntu-latest
    needs: build
    # No job-level `if` here: the `matrix` context does not exist yet at job-if
    # evaluation time (it's only resolved per expanded step), so referencing
    # matrix.suite here made GitHub fail to parse the whole workflow file
    # ("Unrecognized named-value: 'matrix'"), which meant EVERY run of this
    # workflow showed "No jobs were run" / failure with zero jobs scheduled.
    # The equivalent per-suite selection has been moved to the "Run tests"
    # step below, where `matrix` is valid.
    strategy:
      fail-fast: false
      matrix:
        suite: [smoke, auth, portal]
        include:
          - suite: dashboard
            requires_auth: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium

      - name: Download build artifact
        if: matrix.suite != 'dashboard'
        uses: actions/download-artifact@v4
        with:
          name: build
          path: .next/

      - name: Run ${{ matrix.suite }} tests
        # Moved down from the job-level `if` (see comment on the job above) —
        # `matrix` is only valid inside steps, not job-level conditions.
        if: github.event.inputs.test_suite == 'full' || github.event.inputs.test_suite == matrix.suite || (github.event.inputs.test_suite == '' && matrix.suite != 'dashboard')
        run: |
          if [ "${{ matrix.suite }}" == "smoke" ]; then
            pnpm test:e2e:smoke
          elif [ "${{ matrix.suite }}" == "auth" ]; then
            pnpm playwright test tests/e2e/auth
          elif [ "${{ matrix.suite }}" == "portal" ]; then
            pnpm playwright test tests/e2e/portal
          elif [ "${{ matrix.suite }}" == "dashboard" ]; then
            pnpm playwright test tests/e2e/dashboard
          fi
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.suite }}
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.suite }}
          path: playwright-results.json
          retention-days: 7

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ matrix.suite }}
          path: test-results/
          retention-days: 14

  # ============================================
  # Job 4: Dashboard Tests (requires auth)
  # ============================================
  e2e-dashboard:
    name: E2E Dashboard
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.test_suite == 'full' || github.event.inputs.test_suite == 'dashboard' || github.event.inputs.test_suite == ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: .next/

      - name: Run dashboard tests
        run: pnpm playwright test tests/e2e/dashboard
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-dashboard
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-dashboard
          path: playwright-results.json
          retention-days: 7

  # ============================================
  # Job 5: Cross-browser Tests (full suite only)
  # ============================================
  e2e-cross-browser:
    name: E2E Cross-browser (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.test_suite == 'full' && github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps ${{ matrix.browser }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: .next/

      - name: Run smoke tests on ${{ matrix.browser }}
        run: pnpm test:e2e:smoke
        env:
          BASE_URL: http://localhost:3000

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ matrix.browser }}
          path: test-results/
          retention-days: 14

  # ============================================
  # Job 6: Visual Regression (PR only)
  # ============================================
  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: .next/

      - name: Run visual tests
        run: pnpm playwright test tests/e2e/visual
        env:
          BASE_URL: http://localhost:3000

      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-artifacts
          path: test-results/
          retention-days: 14
